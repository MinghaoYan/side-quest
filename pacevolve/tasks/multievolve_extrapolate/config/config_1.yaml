llm:
  name: "gemini-2.5-pro"
  client_type: "gemini"
  context_size: 120000
  safety_margin: 600
  max_try_count: 5

experiment:
  max_iters: 1000
  task_id: "multievolve_extrapolate"
  max_hparam_iters: 0
  sota_algo_name: "MULTIEVOLVE_EXTRAPOLATE"
  initial_baseline_id: -1
  num_cpu_cores: 32

paths:
  data_path: "/workspace/pacevolve/tasks/multievolve_extrapolate/data"
  src_path: "/workspace/pacevolve/tasks/multievolve_extrapolate/src"
  eval_path: "/workspace/pacevolve/tasks/multievolve_extrapolate/eval"
  results_path: "/workspace/pacevolve/tasks/multievolve_extrapolate/results"
  target_file_path: "multievolve_extrapolate_1.py"
  log_dir: "/workspace/pacevolve/tasks/multievolve_extrapolate/verbose"
  transcript_dir: "/workspace/pacevolve/tasks/multievolve_extrapolate/transcripts"

compilation:
  recompile_timeout: 120
  recompile_max_retries: 2
  edit_start_tag: "RegexTagCustomPruningAlgorithmStart"
  edit_end_tag: "RegexTagCustomPruningAlgorithmEnd"

evaluation:
  eval_timeout: 1200
  eval_max_retries: 1
  eval_script_name: "evaluate_multievolve_extrapolate.py"
  benchmark_level: "lite"
  benchmark_protocol: "paper"
  max_parallel_evals: 2
  target_score: 0.70
  init_score: 0.0
  metric_direction: "max"
  eval_configs:
    - dataset: "multievolve_public_lite"

analysis:
  enabled: false
  diagnosis_enabled: false

database:
  num_islands: 8
  tournament_size: 2
  top_k: 4
  max_queue_size: 100

workflow_loops:
  initial_compile:
    max_attempts: 3
    loop_tag: "initial_compile_loop"
    summary_tag: "initial_compile_summary"
  initial_eval:
    max_attempts: 2
    max_compile_attempts: 4
    loop_tag: "initial_eval_loop"
    summary_tag: "initial_eval_summary"
    compile_loop_tag: "compile_within_eval_loop"
    compile_summary_tag: "compile_summary"

summarization:
  context_lines_after_error: 3
  max_lines_fallback: 40
  max_summary_lines: 60
