llm:
  name: "gemini-3.1-pro-preview"
  client_type: "gemini"
  context_size: 120000
  safety_margin: 600
  max_try_count: 5

experiment:
  max_iters: 500
  task_id: "kuairec"
  max_hparam_iters: 0
  sota_algo_name: "KUAIREC"
  initial_baseline_id: -1
  num_cpu_cores: 16

paths:
  data_path: "/workspace/pacevolve/tasks/kuairec/data/sasrec_format.csv"
  src_path: "/workspace/pacevolve/tasks/kuairec/src"
  eval_path: "/workspace/pacevolve/tasks/kuairec/eval"
  results_path: "/workspace/pacevolve/tasks/kuairec/results"
  target_file_path: "train_kuairec.py"
  log_dir: "/workspace/pacevolve/tasks/kuairec/verbose"
  transcript_dir: "/workspace/pacevolve/tasks/kuairec/transcripts"

compilation:
  recompile_timeout: 60
  recompile_max_retries: 2
  conda_env: ""
  edit_start_tag: "RegexTagCustomPruningAlgorithmStart"
  edit_end_tag: "RegexTagCustomPruningAlgorithmEnd"

evaluation:
  eval_timeout: 1200
  eval_max_retries: 1
  eval_script_name: "evaluate_kuairec.py"
  max_parallel_evals: 1
  target_score: 0.30
  init_score: 0.05
  metric_direction: "max"
  eval_configs:
    - dataset: "kuairec"

analysis:
  enabled: false
  diagnosis_enabled: false

database:
  num_islands: 1
  tournament_size: 2
  top_k: 4
  max_queue_size: 100

workflow_loops:
  initial_compile:
    max_attempts: 3
    loop_tag: "initial_compile_loop"
    summary_tag: "initial_compile_summary"
  initial_eval:
    max_attempts: 3
    max_compile_attempts: 4
    loop_tag: "initial_eval_loop"
    summary_tag: "initial_eval_summary"
    compile_loop_tag: "compile_within_eval_loop"
    compile_summary_tag: "compile_summary"

summarization:
  context_lines_after_error: 3
  max_lines_fallback: 40
  max_summary_lines: 60
