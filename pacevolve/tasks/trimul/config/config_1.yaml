llm:
  name: "gemini-2.5-pro"
  client_type: "gemini"
  context_size: 120000
  safety_margin: 600
  max_try_count: 5

experiment:
  max_iters: 1000
  task_id: "trimul"
  max_hparam_iters: 0
  sota_algo_name: "TRIMUL"
  initial_baseline_id: -1
  num_cpu_cores: 32

paths:
  src_path: "/workspace/pacevolve/tasks/trimul/src"
  eval_path: "/workspace/pacevolve/tasks/trimul/eval"
  results_path: "/workspace/pacevolve/tasks/trimul/results"
  target_file_path: "trimul_1.py"
  log_dir: "/workspace/pacevolve/tasks/trimul/verbose"
  transcript_dir: "/workspace/pacevolve/tasks/trimul/transcripts"

compilation:
  recompile_timeout: 300
  recompile_max_retries: 2
  edit_start_tag: "RegexTagCustomPruningAlgorithmStart"
  edit_end_tag: "RegexTagCustomPruningAlgorithmEnd"

evaluation:
  eval_timeout: 600
  eval_max_retries: 1
  eval_script_name: "evaluate_trimul.py"
  max_parallel_evals: 1
  target_score: 5.0
  init_score: 1.0
  metric_direction: "max"
  eval_configs:
    - dataset: "trimul"

database:
  num_islands: 1
  tournament_size: 2
  top_k: 4
  max_queue_size: 100

workflow_loops:
  initial_compile:
    max_attempts: 3
    loop_tag: "initial_compile_loop"
    summary_tag: "initial_compile_summary"
  initial_eval:
    max_attempts: 2
    max_compile_attempts: 4
    loop_tag: "initial_eval_loop"
    summary_tag: "initial_eval_summary"
    compile_loop_tag: "compile_within_eval_loop"
    compile_summary_tag: "compile_summary"

summarization:
  context_lines_after_error: 3
  max_lines_fallback: 40
  max_summary_lines: 60
